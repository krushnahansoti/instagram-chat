<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Instagram Chat Viewer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ---------- THEMES ---------- */

:root{
--bg:#fafafa;
--chatbg:white;
--received:#efefef;
--sent-gradient:linear-gradient(45deg,#3797F0,#5851DB);
--text:#000;
--time:#8e8e8e;
}

.dark{
--bg:#000;
--chatbg:#121212;
--received:#262626;
--sent-gradient:linear-gradient(45deg,#3797F0,#5851DB);
--text:#e4e6eb;
--time:#a8a8a8;
}

.love{
--bg:#1a0f14;
--chatbg:#2b1a20;
--received:#3a252c;
--sent-gradient:linear-gradient(45deg,#ff3e6c,#ff6a88,#ff99ac);
--text:#ffe6eb;
--time:#ffb3c1;
}

/* ---------- PAGE ---------- */

body{
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

/* ---------- TOP BAR ---------- */

.topbar{
width:100%;
max-width:700px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:15px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#ddd;
cursor:pointer;
font-size:14px;
}

button:hover{
opacity:0.8;
}

/* ---------- CHAT ---------- */

.chat{
width:100%;
max-width:700px;
background:var(--chatbg);
padding:18px;
display:flex;
flex-direction:column;
}

/* ---------- MESSAGE ---------- */

.message{
max-width:75%;
padding:10px 14px;
margin:6px 0;
font-size:15px;
line-height:1.4;
word-wrap:break-word;
color:var(--text);
}

.sent{
align-self:flex-end;
background:var(--sent-gradient);
color:white;
border-radius:18px 18px 4px 18px;
}

.received{
align-self:flex-start;
background:var(--received);
border-radius:18px 18px 18px 4px;
}

/* ---------- TIME ---------- */

.time{
font-size:11px;
color:var(--time);
margin-top:4px;
}

/* ---------- IMAGE ---------- */

.message img{
max-width:100%;
border-radius:12px;
margin-top:6px;
}

/* ---------- MOBILE ---------- */

@media (max-width:600px){

.chat{
padding:12px;
}

.message{
font-size:16px;
max-width:80%;
}

.topbar{
flex-direction:column;
align-items:center;
}

}

</style>
</head>

<body>

<div class="topbar">

<input type="file" id="fileInput">

<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('love')">Love</button>

</div>

<div class="chat" id="chat"></div>

<script>

/* CHANGE THIS TO YOUR INSTAGRAM USERNAME */

const myName = "Groot";


/* ---------- THEME SWITCH ---------- */

function setTheme(theme){

document.body.classList.remove("dark","love");

if(theme==="dark"){
document.body.classList.add("dark");
}

if(theme==="love"){
document.body.classList.add("love");
}

}


/* ---------- LOAD CHAT FILE ---------- */

document.getElementById("fileInput").addEventListener("change",function(e){

const file = e.target.files[0];

const reader = new FileReader();

reader.onload = function(event){

const parser = new DOMParser();

const doc = parser.parseFromString(event.target.result,"text/html");

/* Instagram messages */

const blocks = [...doc.querySelectorAll("div.pam")].reverse();

const chat = document.getElementById("chat");

chat.innerHTML="";


blocks.forEach(block=>{

const sender = block.querySelector("h2._a6-h")?.innerText;

const messageDiv = block.querySelector("div._a6-p");

const time = block.querySelector("div._a6-o")?.innerText;

if(!messageDiv) return;


/* text */

let text = messageDiv.innerText.trim();

/* image */

const img = messageDiv.querySelector("img");


const bubble = document.createElement("div");

bubble.classList.add("message");


if(sender === myName){
bubble.classList.add("sent");
}else{
bubble.classList.add("received");
}


let content = "";


/* render image */

if(img){
content += `<img src="${img.getAttribute("src")}">`;
}


/* render text */

if(text){
content += `<div>${text}</div>`;
}


/* render time */

content += `<div class="time">${time}</div>`;


bubble.innerHTML = content;

chat.appendChild(bubble);

});


/* scroll to bottom */

window.scrollTo(0,document.body.scrollHeight);

};

reader.readAsText(file);

});

</script>

</body>
</html>
